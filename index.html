<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fish Feeder</title>

    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo-box">
        <img src="images/pensc.jpg" alt="Logo Kiri">
    </div>

    <div class="header-text">
        <h1>🐟 Smart Fish Feeder</h1>
        <p>Monitoring dan Kontrol Pemberian Pakan Ikan</p>
    </div>

    <div class="logo-box">
        <img src="images/elinc.jpg" alt="Logo Kanan">
    </div>
</header>

<div class="container">

    <!-- STATUS -->
    <div class="card">
        <h2>Status Feeding</h2>
        <div id="feedingStatus" class="status waiting">
            🟢 Belum waktunya feeding
        </div>
    </div>

    <!-- BERAT -->
    <div class="card">
        <h2>Berat Pakan Saat Ini</h2>

        <div class="weight" id="weightValue">
            850 gram
        </div>

        <div id="stockStatus" class="stock-good">
            Aman
        </div>
    </div>

    <!-- JADWAL -->
    <div class="card">
        <div class="section-title">
            <h2>Jadwal Feeding</h2>

            <button class="add-btn" onclick="openAddModal()">
                + Tambah Jadwal
            </button>
        </div>

        <div id="scheduleContainer">
        </div>
    </div>

    <!-- KONTROL -->
    <div class="card">

        <h2>Kontrol Manual</h2>

        <div class="manual-feed-container">

            <label>
                Pilih Sudut Servo
            </label>

            <select id="servoAngle">

                <option value="20">20°</option>
                <option value="30">30°</option>
                <option value="40">40°</option>
                <option value="45">45°</option>
                <option value="50">50°</option>
                <option value="55">55°</option>
                <option value="60">60°</option>
                <option value="65">65°</option>
                <option value="70">70°</option>
                <option value="75">75°</option>
                <option value="80">80°</option>
                <option value="85">85°</option>
                <option value="90">90°</option>

            </select>

        </div>

        <button
            class="feed-btn"
            onclick="manualFeed()"
        >
            Beri Pakan Sekarang
        </button>

    </div>

    <!-- HISTORY -->
    <div class="card">
        <h2>Riwayat Pemberian Pakan</h2>

        <div class="table-wrapper">

            <table>

                <thead>
                    <tr>
                        <th>Tanggal</th>
                        <th>Waktu</th>
                        <th>Sudut</th>
                        <th>Berat Keluar</th>
                        <th>Status</th>
                    </tr>
                </thead>

                <tbody id="historyTable">

                </tbody>

            </table>

        </div>

        <div class="pagination">

            <button onclick="previousPage()">
                Previous
            </button>

            <span id="pageNumber">1</span>

            <button onclick="nextPage()">
                Next
            </button>

        </div>
    </div>

</div>

<!-- MODAL -->
    <button onclick="openAddModal()">
        Tambah Jadwal
    </button>

<div id="scheduleModal" class="modal">

    <div class="modal-content">

        <h3 id="modalTitle">
            Tambah Jadwal
        </h3>

        <input type="time" id="scheduleTime">

        <div class="modal-buttons">

            <button onclick="saveSchedule()">
                Simpan
            </button>

            <button onclick="closeModal()">
                Batal
            </button>

        </div>

    </div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
